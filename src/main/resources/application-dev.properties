spring.datasource.url=jdbc:mysql://localhost:3306/online_shop?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DATABASE_USERNAME:online_shop_data_user}
spring.datasource.password=${DATABASE_PASSWORD:@DataUser}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

server.port=8989